version: "1.2.8"
cache: false

interface:
  appTitle: "Projet Manhattan"
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true

# ---------------------------------------------------------------------------
# CONFIGURATION DES ENDPOINTS
# ---------------------------------------------------------------------------
endpoints:
  openAI:
    disabled: true
  google:
    disabled: true
  anthropic:
    disabled: true
  custom:
    # 1. OpenAI
    - name: "OpenAI"
      apiKey: "user_provided"
      baseURL: "https://api.openai.com/v1"
      iconURL: "openAI"
      models:
        default: ["gpt-5.5", "gpt-5.5-pro", "gpt-5.4", "gpt-5.4-pro", "gpt-5.4-mini", "gpt-5.4-nano", "gpt-4o"]
        fetch: false
      titleConvo: true
      titleModel: "gpt-4o"
      summarize: false
      modelDisplayLabel: "ChatGPT"

    # 2. Anthropic AI
    - name: "Anthropic AI"
      provider: "anthropic"
      apiKey: "user_provided"
      baseURL: "https://api.anthropic.com"
      iconURL: "https://cdn.simpleicons.org/claude/D97757"
      headers:
        anthropic-version: "2023-06-01"
      models:
        default: ["claude-opus-4-8", "claude-sonnet-4-6", "claude-haiku-4-5"]
        fetch: false
      titleConvo: true
      titleModel: "claude-haiku-4-5"
      summarize: false
      modelDisplayLabel: "Claude"

    # 3. Gemini
    - name: "Gemini"
      apiKey: "user_provided"
      baseURL: "https://generativelanguage.googleapis.com/v1beta/openai/"
      iconURL: "https://unpkg.com/@lobehub/icons-static-svg@latest/icons/gemini-color.svg"
      dropParams: ["store"]
      models:
        default: ["gemini-3.5-flash", "gemini-3.1-pro-preview", "gemini-3.1-flash-lite"]
        fetch: false
      titleConvo: true
      titleModel: "gemini-3.5-flash"
      summarize: false
      modelDisplayLabel: "Gemini"

    # 4. DeepSeek
    - name: "DeepSeek"
      apiKey: "user_provided"
      baseURL: "https://api.deepseek.com/v1"
      iconURL: "https://cdn.simpleicons.org/deepseek/4D6BFE"
      models:
        default: ["deepseek-chat", "deepseek-reasoner"]
        fetch: false
      titleConvo: true
      titleModel: "deepseek-chat"
      summarize: false
      modelDisplayLabel: "DeepSeek"

    # 5. Cohere
    - name: "Cohere"
      apiKey: "user_provided"
      baseURL: "https://api.cohere.ai/compatibility/v1"
      models:
        default: ["command-r-plus", "command-r", "command"]
        fetch: false
      titleConvo: true
      titleModel: "command-r-plus"
      summarize: false
      modelDisplayLabel: "Cohere"

    # 6. CATEGORIE CHAT (Together AI)
    - name: "Chat"
      apiKey: "user_provided"
      baseURL: "https://api.together.xyz/v1"
      iconURL: "https://i.imgur.com/vE9lnI5.png"
      models:
        default: ["deepseek-ai/DeepSeek-V4-Pro", "Qwen/Qwen3.7-Max", "Qwen/Qwen3.6-Plus", "Qwen/Qwen3.5-397B-A17B", "Qwen/Qwen3.5-9B-FP8", "Qwen/Qwen2.5-7B-Instruct-Turbo", "google/gemma-4-31b-it-fp8", "pearl-ai/gemma-4-31b-it-pearl", "google/gemma-3n-e4b-instruct", "nvidia/nemotron-3-ultra-550b-a55b-nvfp4", "minimax/minimax-m3", "minimax/minimax-m2.7-fp4", "moonshot/kimi-k2.7-code", "moonshot/kimi-k2.6-fp4", "openai/gpt-oss-120b", "openai/gpt-oss-20b", "togethercomputer/lfm2-24b-a2b", "zai-org/glm-5.2", "zai-org/glm-5.1-fp4", "zai-org/glm-5-fp4", "deepcogito/cogito-v2.1-671b", "essential-ai/rnj-1-instruct", "meta-llama/Llama-3.3-70B-Instruct-Turbo", "meta-llama/Llama-3-8B-Instruct-Lite", "Qwen/Qwen3-235B-A22B-Instruct-2507-FP8"]
        fetch: false
      titleConvo: true
      titleModel: "deepseek-ai/DeepSeek-V4-Pro"
      summarize: false

    # 7. CATEGORIE VISION (Together AI)
    - name: "Vision"
      apiKey: "user_provided"
      baseURL: "https://api.together.xyz/v1"
      iconURL: "https://i.imgur.com/yuWUbqi.png"
      models:
        default: ["moonshot/kimi-k2.7-code-vision", "google/gemma-3n-e4b-vision", "google/gemma-4-31b-vision", "moonshot/kimi-k2.6-vision", "minimax/minimax-m3-vision", "Qwen/Qwen3.5-9B-Vision", "Qwen/Qwen3.6-Plus-Vision", "Qwen/Qwen3.7-Plus-Vision"]
        fetch: false
      titleConvo: true

    # 8. CATEGORIE IMAGE (Together AI)
    - name: "Image"
      apiKey: "user_provided"
      baseURL: "https://api.together.xyz/v1"
      iconURL: "https://i.imgur.com/AXO48ho.png"
      models:
        default: ["black-forest-labs/FLUX.1-schnell", "black-forest-labs/FLUX.2-dev", "black-forest-labs/FLUX.2-flex", "black-forest-labs/FLUX.2-pro", "black-forest-labs/FLUX.2-max", "black-forest-labs/FLUX.1-kontext-pro", "black-forest-labs/FLUX.1-kontext-max", "black-forest-labs/FLUX1.1-pro", "ideogram/ideogram-4.0", "ideogram/ideogram-3.0", "openai/gpt-image-1.5", "openai/gpt-image-2", "bytedance/seedream-3.0", "bytedance/seedream-4.0", "bytedance/seedream-5.0-lite", "google/imagen-4.0-fast", "google/imagen-4.0-ultra", "google/imagen-4.0-preview", "wan-ai/wan-2.6-image", "stabilityai/stable-diffusion-xl-base-1.0", "rundiffusion/juggernaut-lightning-flux", "rundiffusion/juggernaut-pro-flux"]
        fetch: false
      titleConvo: false
      summarize: false

    # 9. CATEGORIE AUDIO (Together AI)
    - name: "Audio"
      apiKey: "user_provided"
      baseURL: "https://api.together.xyz/v1"
      iconURL: "https://i.imgur.com/bwpD8Ts.png"
      models:
        default: ["openai/whisper-large-v3", "cartesia/sonic-3", "cartesia/sonic-2", "cartesia/sonic", "hexgrad/kokoro-82m", "canopy-labs/orpheus-3b-0.1-ft"]
        fetch: false
      titleConvo: true

    # 10. CATEGORIE VIDEO (Together AI)
    - name: "Vidéo"
      apiKey: "user_provided"
      baseURL: "https://api.together.xyz/v1"
      iconURL: "https://i.imgur.com/QsTyQQQ.png"
      models:
        default: ["openai/sora-2", "openai/sora-2-pro", "google/veo-3.0-fast-audio", "google/veo-3.0-audio", "google/veo-3.0-fast", "google/veo-2.0", "google/veo-3.1", "google/veo-3.1-lite", "kwaivgi/kling-2.1-pro", "kwaivgi/kling-2.1-master", "kwaivgi/kling-2.1-standard", "wan-ai/wan-2.2-t2v", "wan-ai/wan-2.2-i2v", "wan-ai/wan-2.7-t2v", "wan-ai/wan-2.7-i2v", "bytedance/seedance-1.0-pro", "bytedance/seedance-1.0-lite", "bytedance/seedance-2.0", "minimax/hailuo-02", "pixverse/pixverse-v5", "pixverse/pixverse-v5.6", "pixverse/pixverse-v6", "vidu/vidu-q1", "vidu/vidu-q3", "vidu/vidu-2.0"]
        fetch: false
      titleConvo: false
      summarize: false

# ---------------------------------------------------------------------------
# SECURITE, FICHIERS & ARBORESCENCE MEMOIRE INTERNE
# ---------------------------------------------------------------------------
fileConfig:
  endpoints:
    default:
      fileLimit: 10
      fileSizeLimit: 25
      totalSizeLimit: 100
      supportedMimeTypes: ["image/.*", "application/pdf", "text/.*"]
  serverFileSizeLimit: 100
  avatarSizeLimit: 2
  imageOutputType: "png"

memory:
  enabled: true
  embeddingModel: "text-embedding-3-large"
  topK: 5
  chunkSize: 1500
  chunkOverlap: 200
  folders:
    - name: "Memoire Interne Generale"
      description: "Dossier racine centralisant toutes les connaissances du Projet Manhattan."
      subfolders:
        - name: "prompts generaux"
        - name: "marketing"
        - name: "branding"
        - name: "business plan"
        - name: "financement"
        - name: "gestion et comptabilite"
        - name: "juridique et statuts"
        - name: "textile et sourcing"
        - name: "autre"
